  <!-- ═══ Estilos del rediseño (del prototipo) ═══ -->
  <style>
/* ───────────────── tokens ───────────────── */
:root{
  --bg:#0B1018;
  --bg-2:#0E141F;
  --surface:#161D2B;
  --surface-2:#1E2638;
  --line:#222B3E;
  --line-2:#2D3850;
  --ink:#F4EFE6;
  --ink-dim:#B6BECC;
  --ink-mute:#8B95A8;
  --cream:#F4EFE6;
  --cream-2:#EBE3D2;
  --paper:#FAF6EE;
  --accent:#FF5A1F;
  --accent-2:#FF8C5A;
  --green:#1FD17B;
  --green-2:#7BE7B7;
  --violet:#9D7BFF;
  --blue:#5AC8FF;
  --yellow:#FFD23F;
  --radius:18px;
  --ease:cubic-bezier(.2,.7,.2,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:"Geist","Helvetica Neue",system-ui,sans-serif;font-feature-settings:"ss01","cv11";-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
body{overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
img{display:block;max-width:100%}

::selection{background:var(--accent);color:#fff}

/* ambient cursor light */
#ambient{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(600px 600px at var(--mx,50%) var(--my,30%), rgba(255,90,31,0.13), transparent 60%);
  transition:background 200ms linear;
  mix-blend-mode:screen;
}

/* ───────────────── layout ───────────────── */
.wrap{max-width:1280px;margin:0 auto;padding:0 28px;position:relative;z-index:1}
section{position:relative;z-index:1}

/* ───────────────── type ───────────────── */
.display{
  font-family:"Bricolage Grotesque","Helvetica Neue",sans-serif;
  font-weight:600;
  letter-spacing:-0.035em;
  line-height:0.95;
  font-variation-settings:"opsz" 96;
}
.eyebrow{
  font-family:"JetBrains Mono",monospace;
  font-size:11px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--ink-mute);
  display:inline-flex;align-items:center;gap:10px;
}
.eyebrow::before{content:"";width:18px;height:1px;background:var(--accent)}
.kicker{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-mute)}
.lead{font-size:18px;line-height:1.55;color:var(--ink-dim);max-width:60ch}

/* ───────────────── nav ───────────────── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:50;
  padding:18px 28px;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.nav-inner{
  pointer-events:auto;
  display:flex;align-items:center;gap:6px;
  background:rgba(11,16,24,0.72);
  border:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(20px) saturate(140%);
  -webkit-backdrop-filter:blur(20px) saturate(140%);
  padding:8px 8px 8px 18px;border-radius:999px;
  box-shadow:0 12px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
}
.brand{display:flex;align-items:center;gap:10px;font-family:"Bricolage Grotesque";font-weight:700;letter-spacing:-.02em;font-size:18px;padding-right:14px;margin-right:6px;border-right:1px solid rgba(255,255,255,0.08)}
.brand-dot{width:18px;height:18px;border-radius:6px;background:linear-gradient(135deg,#FF5A1F,#FFD23F);box-shadow:0 0 0 1px rgba(255,255,255,.1) inset, 0 0 22px rgba(255,90,31,.55)}
.nav a.nav-link{font-size:13px;color:var(--ink-dim);padding:8px 14px;border-radius:999px;transition:color .2s var(--ease),background .2s var(--ease)}
.nav a.nav-link:hover{color:var(--ink);background:rgba(255,255,255,0.05)}
.nav .cta{
  font-size:13px;font-weight:500;
  background:var(--cream);color:#0B1018;
  padding:10px 16px;border-radius:999px;
  display:inline-flex;align-items:center;gap:8px;
  transition:transform .25s var(--ease),box-shadow .25s var(--ease);
}
.nav .cta:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(244,239,230,.18)}
.nav .cta .arr{transition:transform .25s var(--ease)}
.nav .cta:hover .arr{transform:translateX(3px)}

/* ───────────────── hero ───────────────── */
.hero{padding:140px 0 80px;position:relative;overflow:hidden}
.hero-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:60px;align-items:end}
.hero h1{font-size:clamp(48px,7.2vw,108px);margin:18px 0 28px}
.hero h1 .word{display:inline-block;padding-bottom:.06em;margin-right:.28em;line-height:0.95;clip-path:inset(-0.1em -0.15em -0.5em -0.05em)}
.hero h1 .word:last-child{margin-right:0}
.hero h1 .word span{display:inline-block;transform:translateY(110%);transition:transform .9s var(--ease-out)}
.hero.is-in h1 .word span{transform:translateY(0)}
.hero h1 .word:nth-child(2) span{transition-delay:.05s}
.hero h1 .word:nth-child(3) span{transition-delay:.10s}
.hero h1 .word:nth-child(4) span{transition-delay:.15s}
.hero h1 .word:nth-child(5) span{transition-delay:.20s}
.hero h1 .word:nth-child(6) span{transition-delay:.25s}
.hero h1 .word:nth-child(7) span{transition-delay:.30s}
.hero h1 .underline-word{position:relative;color:var(--accent)}
.hero h1 .underline-word::after{
  content:"";position:absolute;left:0;right:0;bottom:.04em;height:.18em;
  background:linear-gradient(90deg,#FF5A1F 0%,#FFD23F 100%);
  border-radius:6px;opacity:.18;z-index:-1;
}
.hero-sub{font-size:19px;line-height:1.55;color:var(--ink-dim);max-width:42ch}
.hero-ctas{display:flex;align-items:center;gap:14px;margin-top:34px;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:10px;font-size:14px;font-weight:500;
  padding:14px 22px;border-radius:999px;transition:transform .25s var(--ease),box-shadow .25s var(--ease),background .25s var(--ease);
}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 10px 30px rgba(255,90,31,.35),inset 0 1px 0 rgba(255,255,255,.18)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(255,90,31,.45),inset 0 1px 0 rgba(255,255,255,.25)}
.btn-ghost{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:var(--ink)}
.btn-ghost:hover{background:rgba(255,255,255,0.08)}

.hero-meta{display:flex;align-items:center;gap:28px;margin-top:46px;color:var(--ink-mute);font-size:13px;flex-wrap:wrap}
.hero-meta .dot{width:6px;height:6px;border-radius:99px;background:var(--green);box-shadow:0 0 0 4px rgba(31,209,123,.18);animation:pulse 2s var(--ease) infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(31,209,123,.18)}50%{box-shadow:0 0 0 8px rgba(31,209,123,0)}}

/* hero illustration card */
.hero-illu{position:relative;height:520px}

/* phase ticker */
.phase-strip{
  margin-top:80px;
  display:grid;grid-template-columns:repeat(4,1fr);gap:0;
  border-top:1px solid var(--line);border-bottom:1px solid var(--line);
}
.phase{padding:24px 24px;border-right:1px solid var(--line);display:flex;align-items:baseline;gap:14px;transition:background .3s var(--ease)}
.phase:last-child{border-right:0}
.phase:hover{background:rgba(255,255,255,0.02)}
.phase .num{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink-mute)}
.phase .name{font-family:"Bricolage Grotesque";font-weight:600;font-size:22px;letter-spacing:-.02em}
.phase .arrow{margin-left:auto;color:var(--ink-mute);transition:transform .3s var(--ease),color .3s var(--ease)}
.phase:hover .arrow{transform:translateX(4px);color:var(--accent)}

/* ───────────────── section heading ───────────────── */
.sec{padding:140px 0;position:relative}
.sec-head{display:grid;grid-template-columns:1.1fr .9fr;gap:60px;align-items:end;margin-bottom:60px}
.sec-head h2{font-size:clamp(40px,5vw,72px);margin:14px 0 0;max-width:14ch}
.sec-head p{font-size:17px;color:var(--ink-dim);line-height:1.55;max-width:48ch}

/* ───────────────── problems ───────────────── */
.problems-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.prob{
  position:relative;
  background:linear-gradient(180deg,var(--surface),#13192580);
  border:1px solid var(--line);border-radius:24px;padding:32px;
  display:grid;grid-template-columns:1fr 180px;gap:24px;align-items:end;min-height:280px;
  transition:transform .35s var(--ease),border-color .35s var(--ease),background .35s var(--ease);
  overflow:hidden;
}
.prob::before{
  content:"";position:absolute;inset:0;border-radius:24px;
  background:radial-gradient(400px 200px at var(--px,50%) var(--py,50%),rgba(255,90,31,.10),transparent 60%);
  opacity:0;transition:opacity .4s var(--ease);pointer-events:none;
}
.prob:hover{transform:translateY(-3px);border-color:var(--line-2)}
.prob:hover::before{opacity:1}
.prob-tag{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);background:rgba(255,90,31,.10);border:1px solid rgba(255,90,31,.25);padding:5px 9px;border-radius:6px;display:inline-block;margin-bottom:14px}
.prob h3{font-family:"Bricolage Grotesque";font-weight:600;font-size:24px;letter-spacing:-.02em;line-height:1.15;margin:0 0 10px}
.prob p{color:var(--ink-dim);font-size:14.5px;line-height:1.55;margin:0}
.prob .illu{align-self:center;justify-self:end}

/* ───────────────── services ───────────────── */
.svc-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:36px}
.svc-tab{
  font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.06em;
  padding:9px 14px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--ink-dim);
  transition:all .25s var(--ease);
}
.svc-tab:hover{color:var(--ink);border-color:var(--line-2)}
.svc-tab.active{background:var(--cream);color:#0B1018;border-color:var(--cream)}

.svc-card{
  background:linear-gradient(180deg,var(--surface) 0%,#11172380 100%);
  border:1px solid var(--line);border-radius:28px;
  padding:36px;display:grid;grid-template-columns:1.2fr 1fr;gap:36px;align-items:center;min-height:420px;
  transition:opacity .4s var(--ease),transform .4s var(--ease);
}
.svc-meta{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.svc-num{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-mute);letter-spacing:.1em}
.svc-card h3{font-family:"Bricolage Grotesque";font-weight:600;font-size:44px;letter-spacing:-.03em;line-height:1.02;margin:0 0 18px}
.svc-card p{color:var(--ink-dim);font-size:16px;line-height:1.6;max-width:48ch;margin:0 0 24px}
.svc-bullets{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.svc-bullets li{list-style:none;display:flex;align-items:flex-start;gap:10px;font-size:14px;color:var(--ink-dim)}
.svc-bullets li::before{content:"";width:14px;height:14px;border-radius:99px;background:radial-gradient(circle at 30% 30%,var(--green-2),var(--green));margin-top:3px;flex-shrink:0}
.svc-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(31,209,123,.10);border:1px solid rgba(31,209,123,.25);color:var(--green);padding:8px 14px;border-radius:999px;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.1em}
.svc-illu{justify-self:end;width:100%;max-width:380px}

/* ───────────────── process ───────────────── */
.process{position:relative}
.process-wrap{position:relative;padding-left:34px}
.process-line{position:absolute;left:9px;top:0;bottom:0;width:2px;background:var(--line);overflow:hidden}
.process-line::after{
  content:"";position:absolute;left:0;top:0;width:100%;height:var(--prog,0%);
  background:linear-gradient(180deg,var(--accent),var(--yellow));
  transition:height .15s linear;
}
.step{padding:30px 0;display:grid;grid-template-columns:1.2fr .8fr;gap:48px;border-bottom:1px solid var(--line);position:relative}
.step:last-child{border-bottom:0}
.step::before{
  content:"";position:absolute;left:-31px;top:38px;width:20px;height:20px;border-radius:99px;
  background:var(--bg);border:2px solid var(--line);
  transition:border-color .3s var(--ease),background .3s var(--ease),transform .3s var(--ease);
}
.step.is-in::before{border-color:var(--accent);background:radial-gradient(circle at 30% 30%,#FF8C5A,#FF5A1F);transform:scale(1.1);box-shadow:0 0 0 6px rgba(255,90,31,.12)}
.step-num{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-mute);letter-spacing:.1em;margin-bottom:8px}
.step h3{font-family:"Bricolage Grotesque";font-weight:600;font-size:36px;letter-spacing:-.025em;margin:0 0 14px;line-height:1.05}
.step p{color:var(--ink-dim);font-size:16px;line-height:1.6;margin:0 0 16px;max-width:48ch}
.step-tag{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.1em;color:var(--accent)}
.step-illu{justify-self:end;width:100%;max-width:300px}

/* ───────────────── results ───────────────── */
.results-section{background:var(--cream);color:#0B1018;border-radius:48px 48px 0 0;margin-top:80px}
.results-section .eyebrow{color:#6B6253}
.results-section .eyebrow::before{background:var(--accent)}
.results-section h2{color:#0B1018}
.results-section .lead{color:#5C5547}
.results-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:60px;border-top:1px solid rgba(11,16,24,.08)}
.result{padding:36px 28px 36px 0;border-right:1px solid rgba(11,16,24,.08);position:relative}
.result:last-child{border-right:0}
.result-num{font-family:"Bricolage Grotesque";font-weight:600;font-size:88px;letter-spacing:-.04em;line-height:1;color:#0B1018}
.result-num .suffix{color:var(--accent)}
.result-label{font-size:14px;color:#5C5547;margin-top:14px;line-height:1.45}
.results-callout{margin-top:40px;padding:24px 28px;background:#0B1018;color:var(--cream);border-radius:18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.results-callout strong{color:var(--accent)}

/* ───────────────── testimonial / caso real ───────────────── */
.testi-section{background:var(--cream);color:#0B1018;border-radius:48px 48px 0 0;margin-top:0;padding:120px 0}
.testi-section .eyebrow{color:#6B6253}
.testi-section .eyebrow::before{background:var(--accent)}
.testi-grid{display:grid;grid-template-columns:1.4fr .9fr;gap:80px;align-items:start;margin-top:32px}
.testi-quote{font-family:"Bricolage Grotesque";font-weight:500;font-size:clamp(28px,3.2vw,46px);line-height:1.15;letter-spacing:-.025em;color:#0B1018;margin:0;text-wrap:pretty}
.testi-quote::before{content:"\201C";font-family:"Bricolage Grotesque";font-weight:600;color:var(--accent);font-size:1.4em;line-height:0;margin-right:.05em;vertical-align:-.18em}
.testi-em{color:var(--accent);background:linear-gradient(180deg,transparent 62%,rgba(255,90,31,.18) 62%,rgba(255,90,31,.18) 92%,transparent 92%);padding:0 .08em}
.testi-attr{display:flex;align-items:center;gap:16px;margin-top:36px}
.testi-av{width:54px;height:54px;border-radius:99px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FF8C5A,#FF5A1F);color:#fff;font-family:"Bricolage Grotesque";font-weight:700;font-size:18px;letter-spacing:-.02em;box-shadow:0 8px 24px rgba(255,90,31,.30)}
.testi-name{font-family:"Bricolage Grotesque";font-weight:600;font-size:17px;letter-spacing:-.01em;color:#0B1018}
.testi-role{font-size:13px;color:#6B6253;margin-top:2px}
.testi-metrics{display:flex;flex-direction:column;gap:14px;position:sticky;top:120px}
.testi-metric{background:#fff;border:1px solid rgba(11,16,24,.06);border-radius:20px;padding:24px 26px;display:flex;flex-direction:column;gap:8px;transition:transform .4s var(--ease),box-shadow .4s var(--ease)}
.testi-metric:hover{transform:translateY(-3px);box-shadow:0 18px 40px -20px rgba(11,16,24,.18)}
.testi-metric .testi-num{font-family:"Bricolage Grotesque";font-weight:700;font-size:42px;letter-spacing:-.03em;line-height:1;color:var(--accent)}
.testi-metric .testi-lbl{font-size:13.5px;color:#5C5547;line-height:1.4}
.testi-metric.alt .testi-num{color:#0B1018}
.testi-metric.alt .testi-num em{font-style:normal;color:var(--accent)}
.testi-callout{margin-top:48px;display:inline-flex;align-items:center;gap:12px;background:#0B1018;color:var(--cream);padding:12px 20px 12px 14px;border-radius:999px;font-size:13px}
.testi-callout .arr-bg{width:26px;height:26px;border-radius:99px;background:var(--accent);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:600}

/* ───────────────── FAQ ───────────────── */
.faq-section{background:var(--paper);color:#0B1018;padding:120px 0;border-radius:48px 48px 0 0}
.faq-section .eyebrow{color:#6B6253}
.faq-section .eyebrow::before{background:var(--accent)}
.faq-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:80px;margin-top:40px;align-items:start}
.faq-head h2{color:#0B1018;font-size:clamp(36px,4.4vw,60px)}
.faq-head p{color:#5C5547;font-size:16.5px;line-height:1.55;margin-top:20px}
.faq-side-card{margin-top:36px;padding:24px;background:#0B1018;color:var(--cream);border-radius:20px;display:flex;flex-direction:column;gap:14px}
.faq-side-card h4{font-family:"Bricolage Grotesque";font-weight:600;font-size:20px;letter-spacing:-.01em;margin:0;line-height:1.2}
.faq-side-card p{color:var(--ink-dim);font-size:14px;line-height:1.55;margin:0}
.faq-side-card a{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;color:var(--accent);font-weight:500;transition:gap .25s var(--ease)}
.faq-side-card a:hover{gap:12px}
.faq-list{display:flex;flex-direction:column;border-top:1px solid rgba(11,16,24,.10)}
.faq-item{border-bottom:1px solid rgba(11,16,24,.10);padding:0}
.faq-q{
  width:100%;text-align:left;padding:24px 0;display:flex;align-items:center;gap:20px;
  font-family:"Bricolage Grotesque";font-weight:600;font-size:19px;letter-spacing:-.01em;color:#0B1018;
  cursor:pointer;transition:color .25s var(--ease);
}
.faq-q:hover{color:var(--accent)}
.faq-q .faq-idx{font-family:"JetBrains Mono",monospace;font-size:11px;color:#6B6253;letter-spacing:.1em;font-weight:500;width:24px;flex-shrink:0}
.faq-q .faq-ico{margin-left:auto;width:32px;height:32px;border-radius:99px;border:1px solid rgba(11,16,24,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .3s var(--ease),border-color .3s var(--ease),transform .3s var(--ease);position:relative}
.faq-q .faq-ico::before,.faq-q .faq-ico::after{content:"";position:absolute;width:12px;height:1.5px;background:#0B1018;border-radius:99px;transition:transform .35s var(--ease),background .25s var(--ease)}
.faq-q .faq-ico::after{transform:rotate(90deg)}
.faq-item.open .faq-q .faq-ico{background:var(--accent);border-color:var(--accent)}
.faq-item.open .faq-q .faq-ico::before,
.faq-item.open .faq-q .faq-ico::after{background:#fff}
.faq-item.open .faq-q .faq-ico::after{transform:rotate(0deg)}
.faq-a{
  max-height:0;overflow:hidden;transition:max-height .5s var(--ease),padding .35s var(--ease);
  padding:0 0 0 44px;color:#3D3830;font-size:15.5px;line-height:1.6;
}
.faq-item.open .faq-a{max-height:260px;padding:0 0 24px 44px}

/* ───────────────── comparison ───────────────── */
.compare{background:var(--paper);color:#0B1018;padding:80px 0}
.compare h2{color:#0B1018}
.compare-table{margin-top:48px;border-radius:24px;overflow:hidden;border:1px solid rgba(11,16,24,.08);background:#fff}
.compare-row{display:grid;grid-template-columns:1.2fr 1fr 1fr;border-top:1px solid rgba(11,16,24,.06)}
.compare-row:first-child{border-top:0;background:#F4EFE6}
.compare-row.head{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#6B6253}
.compare-row.head .cell.rise{color:var(--accent)}
.cell{padding:22px 24px;border-left:1px solid rgba(11,16,24,.06);display:flex;align-items:center;gap:10px;font-size:14.5px;color:#3D3830}
.cell:first-child{border-left:0;font-weight:500;color:#0B1018}
.cell.rise{background:rgba(255,90,31,.05);color:#0B1018}
.x,.check{width:18px;height:18px;border-radius:99px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px}
.x{background:rgba(11,16,24,.08);color:#6B6253}
.check{background:var(--green);color:#fff}

/* ───────────────── industries ───────────────── */
.industries{padding:140px 0}
.industries-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:50px}
.ind{
  position:relative;background:var(--surface);border:1px solid var(--line);border-radius:22px;
  padding:28px;min-height:220px;display:flex;flex-direction:column;justify-content:space-between;
  overflow:hidden;transition:transform .4s var(--ease),border-color .4s var(--ease);
}
.ind:hover{transform:translateY(-4px);border-color:var(--line-2)}
.ind-illu{position:absolute;right:-10px;bottom:-10px;opacity:.85;transition:transform .5s var(--ease)}
.ind:hover .ind-illu{transform:translate(-4px,-4px) scale(1.03)}
.ind h4{font-family:"Bricolage Grotesque";font-weight:600;font-size:22px;letter-spacing:-.02em;margin:0 0 6px;line-height:1.15}
.ind p{margin:0;color:var(--ink-mute);font-size:13.5px;line-height:1.5}

/* logo marquee */
.marquee{padding:60px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);overflow:hidden;background:var(--bg-2)}
.marquee-track{display:flex;gap:80px;animation:scroll 36s linear infinite;width:max-content}
.marquee-track:hover{animation-play-state:paused}
.marquee .logo-mock{font-family:"Bricolage Grotesque";font-weight:600;font-size:24px;color:var(--ink-mute);letter-spacing:-.02em;white-space:nowrap;display:flex;align-items:center;gap:10px;opacity:.7;transition:opacity .25s var(--ease)}
.marquee .logo-mock:hover{opacity:1;color:var(--ink)}
.marquee .logo-mock .sq{width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,#2D3850,#1E2638);border:1px solid var(--line-2)}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ───────────────── CTA / form ───────────────── */
.cta-section{padding:140px 0 100px;position:relative}
.cta-card{
  position:relative;border-radius:36px;padding:64px;
  background:radial-gradient(700px 400px at 80% 0%,rgba(255,90,31,.20),transparent 60%),linear-gradient(180deg,#161D2B,#0E141F);
  border:1px solid var(--line);
  display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;
  overflow:hidden;
}
.cta-card::after{
  content:"";position:absolute;right:-100px;top:-100px;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,210,63,.18),transparent 70%);
  filter:blur(20px);pointer-events:none;
}
.cta-card h2{font-family:"Bricolage Grotesque";font-weight:600;font-size:clamp(36px,4.4vw,60px);letter-spacing:-.03em;line-height:1.02;margin:14px 0 18px}
.cta-card .lead{font-size:16.5px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.field{display:flex;flex-direction:column;gap:8px}
.field.full{grid-column:1/-1}
.field label{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-mute)}
.field input,.field select,.field textarea{
  background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;
  padding:14px 16px;color:var(--ink);font-family:inherit;font-size:14.5px;outline:none;
  transition:border-color .25s var(--ease),background .25s var(--ease);
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:rgba(255,255,255,.06)}
.field input::placeholder{color:var(--ink-mute)}
.checks{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.chk{
  display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border-radius:999px;
  border:1px solid var(--line);background:rgba(255,255,255,.02);cursor:pointer;
  font-size:13px;color:var(--ink-dim);transition:all .25s var(--ease);user-select:none;
}
.chk input{display:none}
.chk.on{background:rgba(255,90,31,.10);border-color:rgba(255,90,31,.45);color:var(--ink)}
.chk .box{width:14px;height:14px;border-radius:5px;border:1.5px solid var(--ink-mute);display:inline-flex;align-items:center;justify-content:center;transition:all .2s var(--ease)}
.chk.on .box{background:var(--accent);border-color:var(--accent);color:#fff}

.success{
  padding:28px;border-radius:18px;background:rgba(31,209,123,.08);border:1px solid rgba(31,209,123,.30);
}
.success h3{font-family:"Bricolage Grotesque";font-weight:600;font-size:22px;margin:0 0 8px}
.success p{margin:0;color:var(--ink-dim);font-size:14.5px;line-height:1.55}

/* ───────────────── footer ───────────────── */
footer{padding:80px 0 60px;border-top:1px solid var(--line);background:var(--bg-2);position:relative;overflow:hidden}
.foot-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:48px}
.foot-grid h5{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute);margin:0 0 16px;font-weight:500}
.foot-grid ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:10px}
.foot-grid a{color:var(--ink-dim);font-size:14px;transition:color .2s var(--ease)}
.foot-grid a:hover{color:var(--ink)}
.foot-bottom{margin-top:60px;padding-top:24px;border-top:1px solid var(--line);display:flex;justify-content:space-between;color:var(--ink-mute);font-size:12.5px;flex-wrap:wrap;gap:14px}

/* ───────────────── reveals ───────────────── */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .9s var(--ease-out),transform .9s var(--ease-out)}
.reveal.is-in{opacity:1;transform:none}
.reveal.d-1{transition-delay:.05s}
.reveal.d-2{transition-delay:.10s}
.reveal.d-3{transition-delay:.15s}
.reveal.d-4{transition-delay:.20s}
.reveal.d-5{transition-delay:.25s}

/* ───────────────── responsive ───────────────── */
@media (max-width:980px){
  .hero-grid{grid-template-columns:1fr;gap:30px}
  .hero-illu{height:380px;order:-1}
  .sec-head{grid-template-columns:1fr;gap:18px}
  .problems-grid,.industries-grid,.results-grid,.foot-grid,.cta-card,.svc-card,.step,.compare-row,.form-grid,.testi-grid,.faq-grid{grid-template-columns:1fr;gap:18px}
  .testi-metrics{position:static}
  .compare-row.head{display:none}
  .cell{border-left:0;border-top:1px solid rgba(11,16,24,.06)}
  .phase-strip{grid-template-columns:repeat(2,1fr)}
  .phase:nth-child(2){border-right:0}
  .nav .nav-link{display:none}
  .sec{padding:80px 0}
  .cta-card{padding:36px}
  .results-section{border-radius:24px 24px 0 0}
}
  </style>
</head>
